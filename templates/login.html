<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in · MOST2 Ticket Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <style>
        :root {
            --c-primary: #005300;
            --c-primary-hover: #006b00;
            --c-bg: #f7f6f1;
            --c-surface: #ffffff;
            --c-border: #e2e2dd;
            --c-border-strong: #cdcdc6;
            --c-text: #1f2421;
            --c-text-muted: #6b6f6c;
            --c-danger: #b3261e;
            --c-danger-bg: #fdecea;
            --shadow-sm: 0 1px 2px rgba(15, 30, 20, 0.04), 0 1px 3px rgba(15, 30, 20, 0.06);
            --shadow-md: 0 4px 12px rgba(15, 30, 20, 0.08);
            --radius-sm: 6px;
            --radius-md: 10px;
            --font-stack: var(--font-primary, "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif);
        }
        * { box-sizing: border-box; }
        html { color-scheme: light; }
        body {
            font-family: var(--font-stack);
            background: var(--c-bg);
            color: var(--c-text);
            margin: 0; padding: 0;
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            padding: 32px 36px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 380px;
            margin: 24px;
        }
        .login-card h1 {
            color: var(--c-primary);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 6px 0;
        }
        .login-card .sub {
            color: var(--c-text-muted);
            font-size: 13px;
            margin: 0 0 24px 0;
        }
        .field {
            display: flex; flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--c-text-muted);
        }
        .field input {
            padding: 9px 11px;
            border: 1px solid var(--c-border-strong);
            border-radius: var(--radius-sm);
            font-size: 14px; font-family: inherit;
            color: var(--c-text);
            background: white;
            text-transform: none; letter-spacing: 0; font-weight: 400;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input:focus {
            outline: none;
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px rgba(0, 83, 0, 0.15);
        }
        .btn-primary {
            width: 100%;
            padding: 11px 16px;
            background: var(--c-primary);
            color: white;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 500; font-family: inherit;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: background .15s, transform .05s;
            margin-top: 6px;
        }
        .btn-primary:hover { background: var(--c-primary-hover); }
        .btn-primary:active { transform: translateY(1px); }
        .btn-primary:focus-visible {
            outline: 2px solid var(--c-primary); outline-offset: 2px;
        }
        .login-error {
            background: var(--c-danger-bg);
            color: var(--c-danger);
            border-left: 4px solid var(--c-danger);
            padding: 10px 14px;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            font-size: 13px; line-height: 1.5;
        }
        .login-hint {
            margin-top: 18px;
            font-size: 12px;
            color: var(--c-text-muted);
            text-align: center;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <form method="post" action="{{ url_for('login') }}" class="login-card" autocomplete="on">
        <h1>MOST2 Ticket Search</h1>
        <p class="sub">Sign in with your MOST2 account.</p>

        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}

        <input type="hidden" name="next" value="{{ next_url }}">

        <label class="field">Username
            <input type="text" name="username" value="{{ username }}"
                   autocomplete="username" autofocus required spellcheck="false">
        </label>
        <label class="field">Password
            <input type="password" name="password"
                   autocomplete="current-password" required>
        </label>

        <button type="submit" class="btn-primary">Sign in</button>

        <p class="login-hint">
            Same credentials you use on MOST2. Your password is stored only for the duration of your session.
        </p>
    </form>
</body>
</html>
